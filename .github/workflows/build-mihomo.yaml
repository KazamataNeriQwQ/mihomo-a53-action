name: Build Mihomo for OpenWrt

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (optional, overrides git tag)'
        required: false
        default: ''
  push:
    tags:
      - v*

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set version
        id: set-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "GIT_DISCOVERY_ACROSS_FILESYSTEM=1" >> $GITHUB_ENV

  build:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64_cortex-a53
            sdk: 24.10
          - arch: arm_cortex-a7_neon-vfpv4
            sdk: 24.10
          - arch: x86_64
            sdk: 24.10
          - arch: riscv64
            sdk: SNAPSHOT  # riscv64 special
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build mihomo package
        uses: sirpdboy/gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: mihomo
          NO_REFRESH_CHECK: true
          V: s
          VERSION: ${{ needs.get-version.outputs.version }}
          GIT_DISCOVERY_ACROSS_FILESYSTEM: 1

      - name: Upload artifacts (IPK/APK)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
            bin/packages/riscv64_generic/packages_ci/*.apk
            bin/packages/${{ matrix.arch }}/packages_ci/*.apk
          if-no-files-found: warn

      - name: Create release archive
        run: |
          if [ "${{ matrix.arch }}" = "riscv64" ] && [ "${{ matrix.sdk }}" = "SNAPSHOT" ]; then
            tar -czvf ${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz -C bin/packages/riscv64_generic/ packages_ci
          else
            tar -czvf ${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          name: Mihomo for OpenWrt ${{ needs.get-version.outputs.version }}
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          artifacts: "${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz"
          body: |
            ## Mihomo ${{ needs.get-version.outputs.version }}
            
            Built for OpenWrt 24.10 and SNAPSHOT.
            
            ### Supported architectures
            - ${{ matrix.arch }}
