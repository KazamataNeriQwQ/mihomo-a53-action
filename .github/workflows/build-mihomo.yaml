name: Build Mihomo for OpenWrt

on:
  workflow_dispatch:
  push:
    tags:
      - v*

env:
  PACKAGE_DIRS: "mihomo"

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  scan-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.scan.outputs.packages }}
      package-list: ${{ steps.scan.outputs.package-list }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Scan package directories
        id: scan
        run: |
          PACKAGES_JSON="[]"
          PACKAGE_LIST=""
          
          for dir in ${{ env.PACKAGE_DIRS }}; do
            if [ -d "$dir" ] && [ -f "$dir/Makefile" ]; then
              PKG_NAME=$(grep "^PKG_NAME" "$dir/Makefile" | head -1 | cut -d'=' -f2 | tr -d '[:space:]' || echo "")
              PKG_VERSION=$(grep "^PKG_VERSION" "$dir/Makefile" | head -1 | cut -d'=' -f2 | tr -d '[:space:]' || echo "")
              PKG_TITLE=$(grep "TITLE:=" "$dir/Makefile" | head -1 | cut -d':=' -f2 | sed 's/^[ \t]*//;s/[ \t]*$//' || echo "")
              
              if [ -z "$PKG_NAME" ]; then
                PKG_NAME="$dir"
              fi
              
              PACKAGES_JSON=$(echo "$PACKAGES_JSON" | jq -c \
                --arg name "$PKG_NAME" \
                --arg version "$PKG_VERSION" \
                --arg dir "$dir" \
                --arg title "$PKG_TITLE" \
                '. + [{"name": $name, "version": $version, "dir": $dir, "title": $title}]')
              
              if [ -z "$PACKAGE_LIST" ]; then
                PACKAGE_LIST="$PKG_NAME"
              else
                PACKAGE_LIST="$PACKAGE_LIST $PKG_NAME"
              fi
              
              echo "Found package: $PKG_NAME (version: $PKG_VERSION) in $dir"
            else
              echo "Warning: $dir is not a valid package directory"
            fi
          done
          
          {
            echo "packages<<EOF"
            echo "$PACKAGES_JSON"
            echo "EOF"
            echo "package-list=$PACKAGE_LIST"
          } >> $GITHUB_OUTPUT
          
          echo "Found packages: $PACKAGE_LIST"
          echo "JSON output: $PACKAGES_JSON"

  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    needs: [get-version, scan-packages]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a7
          - arm_cortex-a9
          - x86_64
        sdk:
          - openwrt-24.10
          # - SNAPSHOT  # 如需 SNAPSHOT 版本可取消注释

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build packages
        uses: sirpdboy/gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: mihomo
          NO_REFRESH_CHECK: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
            bin/packages/${{ matrix.arch }}/packages_ci/*.apk

      - name: Create release archive
        run: |
          mkdir -p release
          cp bin/packages/${{ matrix.arch }}/packages_ci/*.ipk release/ 2>/dev/null || true
          cp bin/packages/${{ matrix.arch }}/packages_ci/*.apk release/ 2>/dev/null || true
          tar -czvf ${{ env.PACKAGE_DIRS }}-${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz -C release .

      - name: Generate release notes
        id: release_notes
        env:
          VERSION: ${{ needs.get-version.outputs.version }}
          PACKAGE_LIST: ${{ needs.scan-packages.outputs.package-list }}
        run: |
          cat > release-notes.md << 'EOF'
          # 🚀 Mihomo for OpenWrt ${{ needs.get-version.outputs.version }}
          
          ## 📦 Package Overview
          EOF
          echo "" >> release-notes.md
          echo "| Package | Version | Description |" >> release-notes.md
          echo "|---------|---------|-------------|" >> release-notes.md
          
          PACKAGES_JSON='${{ needs.scan-packages.outputs.packages }}'
          echo "$PACKAGES_JSON" | jq -c '.[]' | while read -r pkg; do
            PKG_NAME=$(echo "$pkg" | jq -r '.name')
            PKG_VERSION=$(echo "$pkg" | jq -r '.version')
            PKG_TITLE=$(echo "$pkg" | jq -r '.title')
            echo "| \`$PKG_NAME\` | \`${PKG_VERSION:-$VERSION}\` | $PKG_TITLE |" >> release-notes.md
          done
          
          echo "" >> release-notes.md
          echo "## 🏗️ Supported Architectures" >> release-notes.md
          echo "" >> release-notes.md
          echo '```' >> release-notes.md
          echo "aarch64_cortex-a53    # ARMv8 64-bit (Cortex-A53)" >> release-notes.md
          echo "aarch64_cortex-a72    # ARMv8 64-bit (Cortex-A72)" >> release-notes.md
          echo "aarch64_generic       # ARMv8 64-bit (Generic)" >> release-notes.md
          echo "arm_cortex-a7         # ARMv7 32-bit (Cortex-A7)" >> release-notes.md
          echo "arm_cortex-a9         # ARMv7 32-bit (Cortex-A9)" >> release-notes.md
          echo "x86_64                # x86-64 64-bit" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          
          echo "## 🔧 Installation" >> release-notes.md
          echo "" >> release-notes.md
          echo "Download the IPK file for your architecture and install:" >> release-notes.md
          echo "" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "opkg install mihomo_*.ipk" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          
          echo "## 📋 Changelog" >> release-notes.md
          echo "" >> release-notes.md
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Changes since $PREV_TAG:" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD | grep -v "Merge" >> release-notes.md
          else
            git log --pretty=format:"- %s (%h)" -10 >> release-notes.md
          fi
          echo "" >> release-notes.md
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release-notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          name: Mihomo for OpenWrt ${{ needs.get-version.outputs.version }}
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          artifacts: "*.tar.gz,release/*.ipk,release/*.apk"
          body: ${{ steps.release_notes.outputs.notes }}
