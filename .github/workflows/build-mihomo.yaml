name: Build Mihomo for OpenWrt

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    needs: get-version
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
        sdk:
          - openwrt-21.02-musl

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure src contains full git metadata
        # The OpenWrt package build copies ./src/ into the package build dir.
        # Many package build steps (and the Go build ldflags) call `git` and expect
        # a working repository. Check out the repo a second time into ./src so
        # ./src/.git is present when OpenWrt copies src/.
        uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0

      - name: Inject version and git env for build
        run: |
          echo "VERSION=${{ needs.get-version.outputs.version }}" >> $GITHUB_ENV
          echo "GIT_DISCOVERY_ACROSS_FILESYSTEM=1" >> $GITHUB_ENV

      - name: Build mihomo package
        uses: sirpdboy/gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: mihomo
          NO_REFRESH_CHECK: true
          V: s
          VERSION: ${{ needs.get-version.outputs.version }}
          GIT_DISCOVERY_ACROSS_FILESYSTEM: 1
          LIBC: musl

      - name: Upload artifacts (for workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
            bin/packages/${{ matrix.arch }}/packages_ci/*.apk
          if-no-files-found: warn

      - name: Create release archive
        run: |
          tar -czvf ${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          name: Mihomo for OpenWrt ${{ needs.get-version.outputs.version }}
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          artifacts: "${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz"
          body: |
            ## Mihomo ${{ needs.get-version.outputs.version }}
            
            Built for OpenWrt (musl).
            
            ### Supported architecture
            - aarch64_generic
