name: Build Mihomo for A53

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Checkout mihomo
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: v1.19.27

      - name: Build in ARM64 Alpine
        run: |
          docker run --rm -v $(pwd):/workspace -w /workspace \
          --platform linux/arm64 \
          alpine:3.19 sh -c "
            apk update &&
            apk add --no-cache go gcc musl-dev git make binutils &&
            CGO_ENABLED=1 \
            GOOS=linux \
            GOARCH=arm64 \
            go build \
            -buildvcs=false \
            -tags with_gvisor \
            -trimpath \
            -ldflags='-w -s -buildid=' \
            -o mihomo-linux-arm64-musl .
          "

      - name: Verify binary
        run: |
          file mihomo-linux-arm64-musl
          readelf -d mihomo-linux-arm64-musl 2>/dev/null | grep NEEDED || echo "No dynamic dependencies"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-aarch64-musl
          path: mihomo-linux-arm64-musl
