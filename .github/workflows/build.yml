name: Build Mihomo with Alpine cross

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Checkout mihomo
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: v1.19.27

      - name: Build in Alpine container
        run: |
          docker run --rm -v $(pwd):/workspace -w /workspace \
          alpine:3.19 sh -c "
            apk update &&
            # 安装正确的交叉编译包
            apk add --no-cache \
              go \
              git \
              make \
              binutils \
              gcc \
              musl-dev \
              g++ \
              gcc-aarch64 \
              musl-dev-aarch64-cross \
              binutils-aarch64 && \
            # 使用交叉编译工具链
            CC=aarch64-alpine-linux-musl-gcc \
            CXX=aarch64-alpine-linux-musl-g++ \
            CGO_ENABLED=1 \
            GOOS=linux \
            GOARCH=arm64 \
            CGO_CFLAGS='-march=armv8-a -mtune=cortex-a53' \
            go build \
            -buildvcs=false \
            -tags with_gvisor \
            -trimpath \
            -ldflags='-w -s -buildid=' \
            -o mihomo-linux-arm64-musl .
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-aarch64-musl
          path: mihomo-linux-arm64-musl
