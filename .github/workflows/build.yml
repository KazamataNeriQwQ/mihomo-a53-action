name: Build Mihomo with musl-cross

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: v1.19.27

      - name: Install musl-cross
        run: |
          sudo apt update
          sudo apt install -y musl-tools  # Ubuntu 的 musl 工具链包

      - name: Build with musl-gcc
        run: |
          CC=musl-gcc \
          CGO_ENABLED=1 \
          GOOS=linux GOARCH=arm64 \
          go build -tags with_gvisor -trimpath \
          -ldflags="-w -s -buildid=" \
          -o mihomo-linux-arm64-musl \
          github.com/MetaCubeX/mihomo

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-musl
          path: mihomo-linux-arm64-musl
