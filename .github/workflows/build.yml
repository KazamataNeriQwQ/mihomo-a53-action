name: Build Mihomo with aarch64-musl-gcc

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install aarch64 musl toolchain
        run: |
          sudo apt update
          sudo apt install -y wget xz-utils
          wget https://musl.cc/aarch64-linux-musl-cross.tgz
          tar -xzf aarch64-linux-musl-cross.tgz
          echo "$(pwd)/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Checkout mihomo
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: v1.19.27

      - name: Build with aarch64-linux-musl-gcc
        run: |
          CC=aarch64-linux-musl-gcc \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=arm64 \
          CGO_CFLAGS="-march=armv8-a -mtune=cortex-a53" \
          go build \
          -tags with_gvisor \
          -trimpath \
          -ldflags="-w -s -buildid=" \
          -o mihomo-linux-arm64-musl .

      - name: Verify binary
        run: |
          file mihomo-linux-arm64-musl
          aarch64-linux-musl-readelf -d mihomo-linux-arm64-musl | grep NEEDED || echo "Static binary"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-aarch64-musl
          path: mihomo-linux-arm64-musl
