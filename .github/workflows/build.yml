name: Build Mihomo for OpenWrt (musl dynamic)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install musl-tools
        run: |
          sudo apt update
          sudo apt install -y musl-tools

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Checkout mihomo
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: v1.19.27

      - name: Build with musl-gcc
        run: |
          CC=musl-gcc \
          CGO_ENABLED=1 \
          GOOS=linux GOARCH=arm64 \
          go build -tags with_gvisor -trimpath \
          -ldflags="-w -s -buildid=" \
          -o mihomo-linux-arm64-musl .

      - name: Verify binary
        run: |
          file mihomo-linux-arm64-musl
          ldd mihomo-linux-arm64-musl || echo "ldd not available"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-openwrt-musl
          path: mihomo-linux-arm64-musl
