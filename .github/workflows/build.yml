name: Build Mihomo with Alpine (musl native)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Checkout mihomo
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: v1.19.27

      - name: Build in Alpine
        run: |
          docker run --rm -v $(pwd):/workspace -w /workspace \
          alpine:3.19 sh -c "
            apk add --no-cache go gcc musl-dev git make binutils &&
            CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            go build -tags with_gvisor -trimpath \
            -ldflags='-w -s -buildid=' \
            -o mihomo-linux-arm64-musl .
          "

      - name: Verify binary
        run: |
          file mihomo-linux-arm64-musl
          ldd mihomo-linux-arm64-musl || echo "ldd not available"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-aarch64-musl
          path: mihomo-linux-arm64-musl          go build \
          -tags with_gvisor \
          -trimpath \
          -ldflags="-w -s -buildid=" \
          -o mihomo-linux-arm64-musl .

      - name: Verify binary
        run: |
          file mihomo-linux-arm64-musl
          aarch64-linux-musl-readelf -d mihomo-linux-arm64-musl | grep NEEDED || echo "Static binary"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-aarch64-musl
          path: mihomo-linux-arm64-musl          -tags with_gvisor \
          -trimpath \
          -ldflags="-w -s -buildid=" \
          -o mihomo-linux-arm64-musl .

      - name: Verify binary
        run: |
          file mihomo-linux-arm64-musl
          aarch64-linux-musl-readelf -d mihomo-linux-arm64-musl | grep NEEDED || echo "Static binary"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-aarch64-musl
          path: mihomo-linux-arm64-musl
