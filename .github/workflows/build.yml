name: Build Mihomo with Alpine (aarch64 cross)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Checkout mihomo
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: v1.19.27

      - name: Build in Alpine container
        run: |
          docker run --rm -v $(pwd):/workspace -w /workspace \
          alpine:3.19 sh -c "
            # 添加镜像源并安装交叉编译工具
            echo 'http://mirrors.tuna.tsinghua.edu.cn/alpine/v3.19/main' > /etc/apk/repositories &&
            echo 'http://mirrors.tuna.tsinghua.edu.cn/alpine/v3.19/community' >> /etc/apk/repositories &&
            apk update &&
            apk add --no-cache \
              go \
              git \
              make \
              binutils \
              gcc \
              musl-dev \
              g++ \
              aarch64-linux-musl-gcc \
              aarch64-linux-musl-g++ &&
            # 使用交叉编译工具链
            CC=aarch64-linux-musl-gcc \
            CXX=aarch64-linux-musl-g++ \
            CGO_ENABLED=1 \
            GOOS=linux \
            GOARCH=arm64 \
            CGO_CFLAGS='-march=armv8-a -mtune=cortex-a53' \
            go build \
            -buildvcs=false \
            -tags with_gvisor \
            -trimpath \
            -ldflags='-w -s -buildid=' \
            -o mihomo-linux-arm64-musl .
          "

      - name: Verify binary
        run: |
          file mihomo-linux-arm64-musl
          readelf -d mihomo-linux-arm64-musl 2>/dev/null | grep NEEDED || echo "No dynamic dependencies"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-aarch64-musl
          path: mihomo-linux-arm64-musl
